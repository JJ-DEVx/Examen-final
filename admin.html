<!DOCTYPE html>
<html>
<head>
    <title>Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h1 class="text-center mb-4">Panel Administrador</h1>

    <form id="form" class="mb-4">
        <input class="form-control mb-2" id="name" placeholder="Nombre" required>
        <input class="form-control mb-2" id="description" placeholder="Descripción" required>
        <input class="form-control mb-2" id="date" type="date" required>
        <input class="form-control mb-2" id="time" type="time" required>
        <input class="form-control mb-2" id="place" placeholder="Lugar" required>
        <input class="form-control mb-2" id="category" placeholder="Categoría" required>

        <button class="btn btn-success w-100">Crear / Actualizar Taller</button>
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>Lugar</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

</div>

<script>
const API = "https://talleres-api-myx2.onrender.com/workshops";
let editId = null;

function cargar(){
    fetch(API)
    .then(res => res.json())
    .then(data => {
        const tabla = document.getElementById("tabla");
        tabla.innerHTML = "";

        data.forEach(w => {
            tabla.innerHTML += `
            <tr>
                <td>${w.name}</td>
                <td>${w.date}</td>
                <td>${w.place}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="editar(${w.id})">Editar</button>
                    <button class="btn btn-danger btn-sm" onclick="eliminar(${w.id})">Eliminar</button>
                </td>
            </tr>
            `;
        });
    });
}

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

   const data = {
    name: document.getElementById("name").value.trim(),
    description: document.getElementById("description").value.trim(),
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    place: document.getElementById("place").value.trim(),
    category: document.getElementById("category").value.trim()
};

    if(editId === null){
        fetch(API, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(data)
        })
        .then(() => {
            alert("Taller creado");
            form.reset();
            cargar();
        });
    } else {
        fetch(API + "/" + editId, {
            method: "PUT",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(data)
        })
        .then(() => {
            alert("Actualizado");
            editId = null;
            form.reset();
            cargar();
        });
    }
});

function editar(id){
    fetch(API + "/" + id)
    .then(res => res.json())
    .then(w => {
        name.value = w.name;
        description.value = w.description;
        date.value = w.date;
        time.value = w.time;
        place.value = w.place;
        category.value = w.category;

        editId = id;
    });
}

function eliminar(id){
    fetch(API + "/" + id, { method: "DELETE" })
    .then(() => {
        alert("Eliminado");
        cargar();
    });
}

cargar();
</script>

</body>
</html>
